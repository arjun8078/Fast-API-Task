name: FastAPI CI Pipeline


on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite:///./test.db"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Basic check
        run: |
          python -c "print('CI working')"

      # 🔥 NEW STEP: Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t fastapi-app .
        
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        run: docker tag fastapi-app ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest